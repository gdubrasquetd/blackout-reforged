org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Works around a Windows-specific Gradle/Kotlin bug where antivirus or a
# lingering file handle prevents the incremental-compilation cache files
# from being closed mid-build ("Could not close incremental caches").
kotlin.incremental=false

workflows:
  # ---------------------------------------------------------------------
  # ios-simulator-preview
  # ---------------------------------------------------------------------
  # No Apple Developer account and no code signing required. This builds
  # BlackOut for the iOS Simulator on one of Codemagic's Mac machines,
  # boots a simulated iPhone, installs and launches the app, and saves
  # screenshots as a downloadable artifact -- enough to actually SEE the
  # app running on iOS without owning a Mac.
  #
  # Setup (one-time, in the Codemagic dashboard, no code changes needed):
  #   1. Create a free account at codemagic.io.
  #   2. "Add application" -> connect this repository (or upload it).
  #   3. Codemagic auto-detects this codemagic.yaml. Start the
  #      "ios-simulator-preview" workflow.
  #   4. When it finishes, download the "screenshots" artifact.
  ios-simulator-preview:
    name: iOS - Simulator preview (no signing required)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.5
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run the test suite
        script: flutter test

      - name: Build for the iOS Simulator (unsigned)
        script: flutter build ios --simulator --release

      - name: Boot a simulator, install and launch the app
        script: |
          set -e
          BUNDLE_ID="fr.guillaume.blackout"
          APP_PATH="build/ios/iphonesimulator/Runner.app"

          # Pick whichever iPhone simulator is actually available on this
          # build machine instead of hardcoding a model name -- the set of
          # pre-created simulators depends on the Xcode version Codemagic
          # assigns, and a hardcoded name (e.g. "iPhone 15") silently fails
          # to boot if that exact model isn't provisioned.
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices[][] | select(.name | test("iPhone"))][0].udid')
          echo "Using simulator: $DEVICE_ID"
          echo "$DEVICE_ID" > /tmp/simulator_device_id

          xcrun simctl bootstatus "$DEVICE_ID" -b || xcrun simctl boot "$DEVICE_ID"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"
          # Give the app a moment to finish its first frame before capturing.
          sleep 5

      - name: Capture screenshots
        script: |
          set -e
          DEVICE_ID=$(cat /tmp/simulator_device_id)
          mkdir -p screenshots
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/01_launch.png
          # Add more `sleep` + `xcrun simctl io "$DEVICE_ID" screenshot ...`
          # pairs here if you want to script taps (via
          # `xcrun simctl ... spawn`) and capture further screens.

    artifacts:
      - screenshots/*.png
      - build/ios/iphonesimulator/*.app

  # ---------------------------------------------------------------------
  # ios-unsigned-ipa (sideload onto a real iPhone with a free Apple ID)
  # ---------------------------------------------------------------------
  # No Apple Developer Program membership needed -- this is the iOS
  # equivalent of sideloading an .apk. It builds an unsigned, device-
  # architecture .ipa; a free tool on your computer (AltStore or
  # Sideloadly) signs it with your own free Apple ID at install time and
  # pushes it to your iPhone over USB/WiFi.
  #
  # Trade-off: apps signed with a free Apple ID expire after 7 days and
  # need re-signing. AltStore automates this (its "AltServer" component
  # refreshes the app automatically whenever your phone and computer share
  # a WiFi network) -- Sideloadly requires you to reinstall manually.
  #
  # To install once this workflow has produced app-unsigned.ipa:
  #   1. Install AltStore (altstore.io) or Sideloadly (sideloadly.io) on
  #      this Windows machine, and the AltStore/companion app on the
  #      iPhone (guided by their installer).
  #   2. Connect the iPhone via USB (or same WiFi network for AltStore).
  #   3. Drag app-unsigned.ipa onto AltStore/Sideloadly, sign in with a
  #      free Apple ID when prompted, and install.
  #   4. On the iPhone: Settings -> General -> VPN & Device Management ->
  #      trust the developer profile for that Apple ID before first launch.
  ios-unsigned-ipa:
    name: iOS - Unsigned IPA (sideload via AltStore/Sideloadly)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.5
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run the test suite
        script: flutter test

      - name: Build for a real device (unsigned)
        script: flutter build ios --release --no-codesign

      - name: Package as an unsigned .ipa
        script: |
          set -e
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q app-unsigned.ipa Payload

    artifacts:
      - build/ios/iphoneos/app-unsigned.ipa

  # ---------------------------------------------------------------------
  # ios-release (signed build for a real device / TestFlight / App Store)
  # ---------------------------------------------------------------------
  # Needs an Apple Developer Program membership (99 USD/year) -- there is
  # no way around that for a build that installs on a physical iPhone or
  # ships to TestFlight/the App Store. Nothing below is usable until you:
  #
  #   1. Enrol in the Apple Developer Program.
  #   2. In Codemagic: Team settings -> Code signing identities ->
  #      connect your Apple Developer account (App Store Connect API key).
  #   3. In Codemagic: Team settings -> Environment variable groups ->
  #      create a group named "appstore_credentials" holding:
  #        - APP_STORE_CONNECT_ISSUER_ID
  #        - APP_STORE_CONNECT_KEY_IDENTIFIER
  #        - APP_STORE_CONNECT_PRIVATE_KEY
  #      (Codemagic's UI generates/collects these for you -- never commit
  #      them to this file or to git.)
  #   4. Uncomment this workflow.
  #
  # ios-release:
  #   name: iOS - Signed release build
  #   max_build_duration: 60
  #   instance_type: mac_mini_m2
  #   integrations:
  #     app_store_connect: appstore_credentials
  #   environment:
  #     flutter: 3.32.5
  #     xcode: latest
  #     ios_signing:
  #       distribution_type: app_store
  #       bundle_identifier: fr.guillaume.blackout
  #   scripts:
  #     - name: Get Flutter packages
  #       script: flutter pub get
  #     - name: Run the test suite
  #       script: flutter test
  #     - name: Set up code signing
  #       script: keychain initialize && app-store-connect fetch-signing-files fr.guillaume.blackout --type IOS_APP_STORE --create
  #     - name: Build signed .ipa
  #       script: |
  #         flutter build ipa --release \
  #           --export-options-plist=/Users/builder/export_options.plist
  #   artifacts:
  #     - build/ios/ipa/*.ipa
  #   publishing:
  #     app_store_connect:
  #       auth: integration
  #       submit_to_testflight: true

  # ---------------------------------------------------------------------
  # android-release (optional -- Android already builds fine locally, but
  # having it in CI too keeps both platforms in one place)
  # ---------------------------------------------------------------------
  # To enable a properly signed build here (not the debug-signed fallback):
  #   1. In Codemagic: Team settings -> Code signing identities -> Android
  #      keystores -> upload your .jks and note the reference name.
  #   2. Reference it under `android_signing:` below.
  android-release:
    name: Android - Release APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: 3.32.5
      # android_signing:
      #   - blackout_upload_keystore
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run the test suite
        script: flutter test
      - name: Build release APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
